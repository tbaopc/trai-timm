<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Thủ Khoa Lý - Fix Lỗi</title>
    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: #000;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="heart"></canvas>

    <script>
        window.requestAnimationFrame =
            window.requestAnimationFrame ||
            window.webkitRequestAnimationFrame ||
            window.mozRequestAnimationFrame ||
            window.oRequestAnimationFrame ||
            window.msRequestAnimationFrame ||
            function (callback) {
                window.setTimeout(callback, 1000 / 60);
            };

        var canvas = document.getElementById('heart');
        var ctx = canvas.getContext('2d');
        var width = canvas.width = window.innerWidth;
        var height = canvas.height = window.innerHeight;
        var rand = Math.random;

        // Công thức tạo hình trái tim chuẩn toán học
        function heartPosition(rad) {
            return [
                Math.pow(Math.sin(rad), 3),
                -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))
            ];
        }

        function scaleAndTranslate(pos, sx, sy, dx, dy) {
            return [dx + pos[0] * sx, dy + pos[1] * sy];
        }

        window.addEventListener('resize', function () {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
        });

        // Tạo ma trận điểm khung cho trái tim đặc ruột
        var pointsOrigin = [];
        var dr = 0.05; // Tăng mật độ điểm để tim dày hơn
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i));
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i).map(v => v * 0.8));
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i).map(v => v * 0.6));
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i).map(v => v * 0.4));
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i).map(v => v * 0.2));
        for (var i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(heartPosition(i).map(v => v * 0.05));

        var heartPointsCount = pointsOrigin.length;
        var targetPoints = [];

        // Hàm tính toán kích thước nhịp đập
        function updatePulse(koef) {
            var targetScale = 12 + koef * 12; // Kích thước trái tim
            for (var i = 0; i < heartPointsCount; i++) {
                targetPoints[i] = scaleAndTranslate(pointsOrigin[i], targetScale * 15, targetScale * 15, width / 2, height / 2);
            }
        }

        // Tạo các hạt chuyển động
        var particles = [];
        var traceCount = 30; // Độ dài vệt sáng đuôi

        for (i = 0; i < heartPointsCount; i++) {
            // FIX LỖI: Cho hạt xuất hiện ngay tại vị trí trái tim thay vì ngẫu nhiên khắp màn hình
            updatePulse(0); 
            var startX = targetPoints[i][0];
            var startY = targetPoints[i][1];

            particles[i] = {
                vx: 0,
                vy: 0,
                speed: rand() * 3 + 3,
                q: i, // Gắn mục tiêu chính xác ban đầu
                D: 2 * (rand() - 0.5),
                force: 0.15 * rand() + 0.75,
                // Màu hồng đỏ neon lấp lánh cực đẹp
                color: "rgba(255, " + ~~(rand() * 40 + 40) + ", " + ~~(rand() * 40 + 100) + ", 0.5)",
                trace: []
            };
            for (var k = 0; k < traceCount; k++) {
                particles[i].trace[k] = { x: startX, y: startY };
            }
        }

        var config = { timeDelta: 0.03 };
        var time = 0;

        function loop() {
            var n = -Math.cos(time);
            updatePulse((1 + n) * 0.5);
            time += ((n > 0 ? 0.2 : 0.05) * config.timeDelta) + 0.005;

            // Tạo hiệu ứng mờ bóng ma (Aura mờ ảo bao quanh)
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, width, height);

            for (var i = particles.length; i--;) {
                var p = particles[i];
                var target = targetPoints[p.q];
                var dx = p.trace[0].x - target[0];
                var dy = p.trace[0].y - target[1];
                var length = Math.sqrt(dx * dx + dy * dy);

                if (10 > length) {
                    if (0.95 < rand()) {
                        p.q = ~~(rand() * heartPointsCount);
                    } else {
                        if (0.99 < rand()) {
                            p.D *= -1;
                        }
                        p.q += p.D;
                        p.q %= heartPointsCount;
                        if (0 > p.q) p.q += heartPointsCount;
                    }
                }

                p.vx += -dx / length * p.speed;
                p.vy += -dy / length * p.speed;
                p.trace[0].x += p.vx;
                p.trace[0].y += p.vy;
                p.vx *= p.force;
                p.vy *= p.force;

                for (var k = 0; k < p.trace.length - 1;) {
                    var T = p.trace[k];
                    var N = p.trace[++k];
                    N.x -= 0.15 * (N.x - T.x);
                    N.y -= 0.15 * (N.y - T.y);
                }

                ctx.fillStyle = p.color;
                for (var k = 0; k < p.trace.length; k++) {
                    ctx.fillRect(p.trace[k].x, p.trace[k].y, 1.5, 1.5);
                }
            }
            requestAnimationFrame(loop);
        }

        // Đợi mọi thứ sẵn sàng rồi chạy mượt mà
        setTimeout(function() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
            loop();
        }, 50);
    </script>
</body>
</html>
